<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>machin · reactive (computed + keyed list)</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font: 16px/1.5 system-ui, sans-serif; color: #e6e6f0;
    background: radial-gradient(120% 120% at 50% 0%, #101a2e 0%, #08080f 60%);
  }
  .card {
    width: min(460px, 92vw); padding: 26px 30px 30px; border-radius: 16px;
    background: #0f1525; border: 1px solid #233055; box-shadow: 0 20px 60px -20px #000;
  }
  h1 { margin: 0 0 12px; font-size: 18px; color: #6fa8ff; letter-spacing: .3px; }
  .stats { display: flex; gap: 24px; margin-bottom: 14px; }
  .stat .k { font-size: 12px; color: #7d88a6; text-transform: uppercase; letter-spacing: .5px; }
  .stat .v { font-size: 34px; font-weight: 800; line-height: 1;
    background: linear-gradient(90deg, #66e0ff, #8b9bff); -webkit-background-clip: text;
    background-clip: text; color: transparent; }
  .items { list-style: none; margin: 0 0 16px; padding: 8px; min-height: 56px;
    display: flex; flex-wrap: wrap; gap: 8px; background: #0b101d;
    border: 1px solid #1c2742; border-radius: 10px; }
  .items li { padding: 6px 12px; border-radius: 8px; background: #1a2545;
    border: 1px solid #2c3a63; font-weight: 700; }
  .items li b { color: #cfe0ff; font-weight: 800; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  button { padding: 9px 14px; font-size: 14px; font-weight: 700; cursor: pointer;
    border-radius: 9px; border: 1px solid #324a7a; background: #1a2545; color: #e6e6f0; }
  button:hover { background: #223160; }
  button.primary { background: #2546a0; border-color: #3a63c8; }
  .tag { margin-top: 16px; font-size: 12px; color: #6b76a0; text-align: center; }
  code { color: #6fa8ff; }
  .flash { animation: fl .5s ease; }
  @keyframes fl { from { background: #2e6cff88; } to {} }
</style>
</head>
<body>
  <main class="card">
    <h1>machin · reactive list</h1>
    <div class="stats">
      <div class="stat"><div class="k">sum</div><div class="v" data-s="sum">0</div></div>
      <div class="stat"><div class="k">count</div><div class="v" data-s="count">0</div></div>
    </div>
    <ul id="items" class="items"></ul>
    <div class="row">
      <button id="add" class="primary">+ add</button>
      <button id="pop">− pop</button>
      <button id="sort">sort ↑</button>
      <button id="rev">reverse</button>
    </div>
    <div class="tag">signals + computed + keyed list in <code>app.src</code> (MFL→wasm) · only deltas patch the DOM</div>
  </main>

<script type="module">
  let memory;
  const dec = new TextDecoder();
  const cstr = (p) => { const b = new Uint8Array(memory.buffer); let e = p; while (b[e]) e++; return dec.decode(b.subarray(p, e)); };
  const flash = (el) => { if (!el) return; el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); };
  const items = document.getElementById('items');

  const imports = {
    env: {
      // bind → set a text slot
      dom_patch: (s, v) => { const el = document.querySelector(`[data-s="${cstr(s)}"]`); if (el) { el.textContent = cstr(v); flash(el); } },
      // each → keyed list ops (the patch list): insert / remove / reorder
      list_insert: (c, k, html) => {
        const li = document.createElement('li');
        li.dataset.k = cstr(k); li.innerHTML = cstr(html);
        document.getElementById(cstr(c)).appendChild(li); flash(li);
      },
      list_remove: (c, k) => { const el = document.querySelector(`#${cstr(c)} > [data-k="${cstr(k)}"]`); if (el) el.remove(); },
      list_order: (c, csv) => {
        const cont = document.getElementById(cstr(c));
        const order = cstr(csv).split(',').filter(Boolean);
        for (const key of order) { const el = cont.querySelector(`[data-k="${key}"]`); if (el) cont.appendChild(el); }
      },
    },
    // no-op WASI shim (imported but never called; see README)
    wasi_snapshot_preview1: { fd_write: () => 0, fd_seek: () => 0, fd_close: () => 0, fd_fdstat_get: () => 0 },
  };

  const { instance } = await WebAssembly.instantiateStreaming(fetch('./app.wasm'), imports);
  memory = instance.exports.memory;
  instance.exports._initialize?.();

  document.getElementById('add').onclick  = () => instance.exports.add(BigInt(1 + (Math.random() * 49 | 0)));
  document.getElementById('pop').onclick  = () => instance.exports.pop();
  document.getElementById('sort').onclick = () => instance.exports.sort_up();
  document.getElementById('rev').onclick  = () => instance.exports.reverse();
  instance.exports.start();
</script>
</body>
</html>
